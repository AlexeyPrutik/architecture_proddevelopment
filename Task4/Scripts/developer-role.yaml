apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: development
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["*"]
